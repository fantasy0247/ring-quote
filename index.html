<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>戒指改圍報價系統</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="戒指報價">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            background-color: #1E0E0A;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        #root { height: 100vh; display: flex; flex-direction: column; }
        .loading-screen {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; color: #D5B98E; font-weight: bold; background-color: #1E0E0A;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">系統載入中...</div>
    </div>

    <script type="text/babel">
        // 確保 Lucide 圖標能正確載入
        const { useState, useMemo, useEffect } = React;
        
        const App = () => {
            const [isLoaded, setIsLoaded] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [material, setMaterial] = useState('gold');
            const [goldPrice, setGoldPrice] = useState(18500);
            const [platinumPrice, setPlatinumPrice] = useState(13500);
            
            // 加入這個 useEffect 確保組件掛載後立即取消載入畫面
            useEffect(() => {
                const timer = setTimeout(() => setIsLoaded(true), 500);
                return () => clearTimeout(timer);
            }, []);

            if (!isLoaded) return <div className="loading-screen">初始化介面...</div>;

            return (
                <div className="flex-1 flex flex-col bg-white h-screen">
                    <div className="safe-top shadow-lg" style={{ backgroundColor: '#1E0E0A' }}>
                        <div className="px-5 py-4 text-white font-bold text-center">戒指改圍報價系統</div>
                    </div>
                    <div className="flex-1 p-5 space-y-6 overflow-y-auto">
                        <div className="bg-gray-100 p-4 rounded-2xl text-center font-bold text-gray-800">
                            🎉 介面已成功載入！
                            <p className="text-sm font-normal mt-2">如果您看到這個畫面，代表程式運作正常。</p>
                        </div>
                        {/* 這裡之後可以繼續放入您原本的報價邏輯內容 */}
                        <div className="p-10 border-2 border-dashed border-amber-200 rounded-3xl text-center text-amber-600">
                            請確認是否已將原本的完整 App 邏輯貼入此處
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
