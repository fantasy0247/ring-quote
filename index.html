<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>戒指報價系統</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --major: #1E0E0A; --gold: #D5B98E; }
        body { margin: 0; background: var(--major); font-family: -apple-system, sans-serif; color: #333; overflow: hidden; }
        .app-container { height: 100vh; display: flex; flex-direction: column; background: white; }
        .header { background: var(--major); color: white; padding: 50px 20px 15px; text-align: center; font-weight: bold; font-size: 18px; }
        .content { padding: 20px; flex: 1; overflow-y: auto; }
        .input-group { margin-bottom: 20px; background: #f5f5f5; padding: 12px; border-radius: 15px; }
        .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; border: none; background: transparent; font-size: 20px; font-weight: bold; outline: none; color: var(--major); }
        .grid { display: grid; grid-cols: 2; display: flex; gap: 10px; }
        .grid > div { flex: 1; border-bottom: 2px solid #eee; padding: 5px; }
        .result-card { margin-top: 30px; background: var(--gold); padding: 30px; border-radius: 25px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .result-label { font-size: 12px; font-weight: bold; opacity: 0.7; letter-spacing: 2px; }
        .result-price { font-size: 45px; font-weight: 900; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">戒指改圍報價系統</div>
        <div class="content">
            <div class="input-group">
                <label>今日金價 (TWD/錢)</label>
                <input type="number" id="goldPrice" value="18500" oninput="calculate()">
            </div>
            <div class="grid">
                <div><label style="font-size:10px; color:#999">原手圍</label><input type="number" id="curSize" value="10" oninput="calculate()" style="width:100%; border:none; font-size:18px; font-weight:bold;"></div>
                <div><label style="font-size:10px; color:orange">目標手圍</label><input type="number" id="tarSize" value="11" oninput="calculate()" style="width:100%; border:none; font-size:18px; font-weight:bold; color:orange;"></div>
            </div>
            <div class="result-card">
                <div class="result-label">建議報價</div>
                <div class="result-price" id="totalPrice">$0</div>
            </div>
            <p style="text-align:center; font-size:10px; color:#ccc; margin-top:20px;">此版本為穩定連線版 (Native JS)</p>
        </div>
    </div>

    <script>
        function calculate() {
            const price = parseFloat(document.getElementById('goldPrice').value) || 0;
            const cur = parseFloat(document.getElementById('curSize').value) || 0;
            const tar = parseFloat(document.getElementById('tarSize').value) || 0;
            
            const diff = tar - cur;
            let result = 0;
            
            if (diff <= 0) {
                result = 1000; // 縮小或不變的基本工費
            } else {
                // 簡易公式：(號差 / 0.5) * 金料常數 * 金價 + 基本工費
                const goldWeight = (diff / 0.5) * 0.014 * 1.15;
                result = Math.round(goldWeight * price) + 1000;
            }
            
            document.getElementById('totalPrice').innerText = '$' + result.toLocaleString();
        }
        // 初始執行一次
        calculate();
    </script>
</body>
</html>
