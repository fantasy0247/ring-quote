<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>戒指報價系統</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <style>
        body { background-color: #1E0E0A; margin: 0; overflow: hidden; font-family: sans-serif; }
        #root { height: 100vh; display: flex; flex-direction: column; background: white; }
        .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; color: #D5B98E; background: #1E0E0A; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"><div class="loading-screen">啟動中...</div></div>
    <script type="text/babel">
        const { useState, useMemo } = React;
        const { BadgeDollarSign, Coins, Gem, TrendingUp } = window.LucideReact || lucideReact;

        const App = () => {
            const [material, setMaterial] = useState('gold');
            const [goldPrice, setGoldPrice] = useState(18500);
            const [width, setWidth] = useState('3.0');
            const [currentSize, setCurrentSize] = useState(10);
            const [targetSize, setTargetSize] = useState(11);

            const quote = useMemo(() => {
                const diff = (Number(targetSize) - Number(currentSize));
                if (diff <= 0) return 1000;
                return Math.round(diff * (Number(goldPrice) * 0.014) + 1000);
            }, [goldPrice, currentSize, targetSize]);

            return (
                <div className="flex-1 flex flex-col">
                    <div className="p-5 text-white flex justify-between items-center" style={{backgroundColor:'#1E0E0A'}}>
                        <span className="font-bold flex items-center gap-2"><BadgeDollarSign size={20} color="#D5B98E"/> 戒指改圍報價</span>
                    </div>
                    <div className="p-6 space-y-6">
                        <div className="bg-gray-100 p-4 rounded-2xl">
                            <label className="text-xs text-amber-700 font-bold block mb-1">今日金價 (TWD/錢)</label>
                            <input type="number" value={goldPrice} onChange={(e)=>setGoldPrice(e.target.value)} className="w-full bg-transparent text-2xl font-bold outline-none" />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="border-b-2 p-1"><label className="text-xs opacity-50 block">原手圍</label><input type="number" value={currentSize} onChange={(e)=>setCurrentSize(e.target.value)} className="w-full outline-none font-bold" /></div>
                            <div className="border-b-2 p-1 border-amber-300"><label className="text-xs text-amber-600 block">目標手圍</label><input type="number" value={targetSize} onChange={(e)=>setTargetSize(e.target.value)} className="w-full outline-none font-bold text-lg" /></div>
                        </div>
                        <div className="mt-10 p-8 rounded-3xl text-center shadow-2xl" style={{backgroundColor:'#D5B98E'}}>
                            <div className="text-xs font-bold opacity-60 mb-2">建議報價</div>
                            <div className="text-5xl font-black">${quote.toLocaleString()}</div>
                        </div>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
