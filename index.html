<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>戒指改圍報價系統</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="戒指報價">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            background-color: #1E0E0A;
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; 
        }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        #root { height: 100vh; display: flex; flex-direction: column; }
        .scroll-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; color: #D5B98E; font-weight: bold; background-color: #1E0E0A; }
        input[type="number"] { -moz-appearance: textfield; border: none; background: transparent; outline: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"><div class="loading-screen">系統載入中...</div></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const Lucide = window.LucideReact || {};
        const { BadgeDollarSign, Unlock, Lock, Coins, Gem, RefreshCw, Loader2, Settings2, ShieldCheck, TrendingUp, X } = Lucide;

        const BRAND = { MAJOR: '#1E0E0A', SECONDARY: '#D5B98E', AUXILIARY: '#EDEDED' };
        const apiKey = "AIzaSyB666C4GJRVXPc28-xORTRJhbLwyD10tlg";

        const PatternLock = ({ onVerify, onClose }) => {
            const [nodes, setNodes] = useState([]);
            const [isDrawing, setIsDrawing] = useState(false);
            const [error, setError] = useState(false);
            const CORRECT_PATTERN = [0, 1, 2, 4, 6, 7, 8];

            const handleEnd = () => {
                setIsDrawing(false);
                if (JSON.stringify(nodes) === JSON.stringify(CORRECT_PATTERN)) { onVerify(); } 
                else if (nodes.length > 0) { 
                    setError(true); 
                    setTimeout(() => { setNodes([]); setError(false); }, 800); 
                }
            };

            const handleTouchMove = (e) => {
                if (!isDrawing) return;
                const touch = e.touches[0];
                const element = document.elementFromPoint(touch.clientX, touch.clientY);
                if (element && element.dataset.index !== undefined) {
                    const index = parseInt(element.dataset.index);
                    if (!nodes.includes(index)) setNodes(prev => [...prev, index]);
                }
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                    <div className="rounded-2xl w-full max-w-[300px] p-6 shadow-2xl relative border border-white/20" style={{ backgroundColor: BRAND.SECONDARY }}>
                        <button onClick={onClose} className="absolute right-3 top-3 text-white p-1">{X ? <X size={24} /> : '✕'}</button>
                        <div className="text-center mb-6 text-white font-bold tracking-widest uppercase"><h3 className="text-base">管理員驗證</h3><p className="text-xs opacity-80 mt-1 font-normal">請繪製解鎖圖形</p></div>
                        <div className="relative grid grid-cols-3 gap-6 mx-auto w-fit mb-6 touch-none" onTouchEnd={handleEnd} onTouchMove={handleTouchMove}>
                            <svg className="absolute inset-0 pointer-events-none w-full h-full overflow-visible">
                                {nodes.map((node, i) => i === 0 ? null : <line key={i} x1={(nodes[i-1]%3)*64+20} y1={Math.floor(nodes[i-1]/3)*64+20} x2={(node%3)*64+20} y2={Math.floor(node/3)*64+20} stroke={error ? "#ef4444" : "white"} strokeWidth="5" strokeLinecap="round" />)}
                            </svg>
                            {[...Array(9)].map((_, i) => <div key={i} data-index={i} onTouchStart={(e) => { e.preventDefault(); setIsDrawing(true); setNodes([i]); }} className={`w-10 h-10 rounded-full border-2 transition-all ${nodes.includes(i) ? (error ? 'bg-red-500 border-red-500' : 'bg-white border-white shadow-lg') : 'bg-white/20 border-white/30'}`} />)}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isAdmin, setIsAdmin] = useState(false);
            const [showPatternLock, setShowPatternLock] = useState(false);
            const [material, setMaterial] = useState('gold');
            const [isFetching, setIsFetching] = useState(false);
            const [targetMargin, setTargetMargin] = useState(25);
            const [goldPrice, setGoldPrice] = useState(18500);
            const [platinumPrice, setPlatinumPrice] = useState(13500);
            const [width, setWidth] = useState('3.0'); 
            const [thickness, setThickness] = useState('1.5');
            const [currentSize, setCurrentSize] = useState(10);
            const [targetSize, setTargetSize] = useState(11);
            const [laborFee, setLaborFee] = useState(1000);

            const fetchRealTimePrices = async () => {
                if (!apiKey) return;
                setIsFetching(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "查詢台灣今日最新銀樓公會公告的黃金（賣出）與鉑金（賣出）價格。請回傳 JSON 格式：{ \"gold\": 數字, \"platinum\": 數字 }。單位必須是 TWD/錢。只回傳 JSON，不要有其他文字。" }] }],
                            tools: [{ google_search: {} }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const result = await response.json();
                    let text = result.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                    // 核心修正：移除 Markdown 標籤以防止 JSON 解析失敗
                    text = text.replace(/```json|```/g, "").trim();
                    const data = JSON.parse(text);
                    if (data.gold) setGoldPrice(data.gold);
                    if (data.platinum) setPlatinumPrice(data.platinum);
                } catch (err) { console.error("價格更新失敗", err); } finally { setIsFetching(false); }
            };

            useEffect(() => { fetchRealTimePrices(); }, []);

            const calc = useMemo(() => {
                const activePrice = material === 'gold' ? Number(goldPrice) : Number(platinumPrice);
                const w = Number(width) || 0; const t = Number(thickness) || 0;
                const cS = Number(currentSize) || 0; const tS = Number(targetSize) || 0;
                const lF = material === 'platinum' ? 1500 : 1000;
                
                const diff = Number((tS - cS).toFixed(2));
                const buffer = material === 'platinum' ? 1.20 : 1.15;
                
                let baseD = 0.01;
                if (w >= 4.0) baseD = 0.019; else if (w >= 3.0) baseD = 0.014; else if (w >= 2.0) baseD = 0.01;
                
                let weight = (diff / 0.5) * baseD * (t / 1.5) * (material === 'platinum' ? 1.3 : 1.0);
                if (weight < 0) weight = 0;
                const finalW = weight * buffer;
                const cost = Math.round(finalW * activePrice) + lF;
                const quote = Math.round(cost / (1 - targetMargin/100));

                return { diff, finalW: finalW.toFixed(4), cost, quote, profit: quote - cost, margin: quote > 0 ? ((quote - cost) / quote * 100).toFixed(1) : 0, bufferText: material === 'platinum' ? '20%' : '15%' };
            }, [goldPrice, platinumPrice, material, width, thickness, currentSize, targetSize, targetMargin]);

            return (
                <div className="flex-1 flex flex-col bg-white h-screen overflow-hidden">
                    {showPatternLock && <PatternLock onVerify={() => { setIsAdmin(true); setShowPatternLock(false); }} onClose={() => setShowPatternLock(false)} />}
                    <div className="safe-top shadow-lg z-20" style={{ backgroundColor: BRAND.MAJOR }}>
                        <div className="px-5 py-4 flex justify-between items-center text-white">
                            <div className="flex items-center gap-3">{BadgeDollarSign && <BadgeDollarSign size={24} style={{ color: BRAND.SECONDARY }} />}<h1 className="text-xl font-bold tracking-[0.1em] uppercase">戒指改圍報價</h1></div>
                            <button onClick={() => isAdmin ? setIsAdmin(false) : setShowPatternLock(true)} className="p-2.5 rounded-full active:scale-95 transition-all" style={isAdmin ? { backgroundColor: BRAND.SECONDARY, color: BRAND.MAJOR } : { backgroundColor: 'rgba(255,255,255,0.1)' }}>{isAdmin ? (Unlock ? <Unlock size={20} /> : '🔓') : (Lock ? <Lock size={20} /> : '🔒')}</button>
                        </div>
                    </div>

                    <div className="scroll-content p-5 space-y-4 flex flex-col">
                        <div className="flex p-1 bg-gray-100 rounded-xl">
                            <button onClick={() => setMaterial('gold')} className={`flex-1 flex items-center justify-center gap-2 py-2.5 text-sm font-bold rounded-lg transition-all ${material === 'gold' ? 'bg-white shadow-sm text-amber-700' : 'text-gray-400'}`}>{Coins && <Coins size={16} />} 18K金</button>
                            <button onClick={() => setMaterial('platinum')} className={`flex-1 flex items-center justify-center gap-2 py-2.5 text-sm font-bold rounded-lg transition-all ${material === 'platinum' ? 'bg-white shadow-sm text-slate-700' : 'text-gray-400'}`}>{Gem && <Gem size={16} />} 鉑金</button>
                        </div>

                        <div className="relative">
                            <div className="flex justify-between items-center absolute left-3 top-1.5 w-[calc(100%-24px)] z-10">
                                <label className="text-[10px] font-black uppercase tracking-wider" style={{ color: BRAND.SECONDARY }}>今日價格 (TWD/錢)</label>
                                <button onClick={fetchRealTimePrices} disabled={isFetching}>{isFetching ? <Loader2 size={12} className="animate-spin text-amber-600" /> : <RefreshCw size={12} className="text-amber-600 opacity-60" />}</button>
                            </div>
                            <div className="flex items-center rounded-2xl border-2 pr-4 bg-[#EDEDED] border-[#EDEDED] focus-within:border-[#D5B98E]">
                                <input type="number" value={material === 'gold' ? goldPrice : platinumPrice} onChange={(e) => material === 'gold' ? setGoldPrice(e.target.value) : setPlatinumPrice(e.target.value)} className="w-full pl-3 pt-5 pb-1.5 bg-transparent text-2xl font-bold text-[#1E0E0A]" />
                                <span className="text-xs font-bold opacity-30">TWD</span>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div className="border-b-2 p-1"><label className="text-[10px] opacity-40 block font-bold">寬度 (mm)</label><input type="number" value={width} onChange={(e)=>setWidth(e.target.value)} className="w-full font-bold text-lg" /></div>
                            <div className="border-b-2 p-1"><label className="text-[10px] opacity-40 block font-bold">厚度 (mm)</label><input type="number" value={thickness} onChange={(e)=>setThickness(e.target.value)} className="w-full font-bold text-lg" /></div>
                            <div className="border-b-2 p-1"><label className="text-[10px] opacity-40 block font-bold">原手圍 (號)</label><input type="number" value={currentSize} onChange={(e)=>setCurrentSize(e.target.value)} className="w-full" /></div>
                            <div className="border-b-2 p-1 border-amber-300"><label className="text-[10px] text-amber-600 block font-bold">目標手圍 (號)</label><input type="number" value={targetSize} onChange={(e)=>setTargetSize(e.target.value)} className="w-full font-bold text-2xl text-amber-700" /></div>
                        </div>

                        {isAdmin && (
                            <div className="p-4 bg-gray-50 rounded-2xl border-l-4 border-amber-400 space-y-3 text-xs shadow-sm">
                                <div className="flex justify-between items-center border-b border-gray-200 pb-1.5"><span className="font-black flex items-center gap-1 uppercase">{Settings2 && <Settings2 size={14} />} 內部分析</span><span className="opacity-50 font-bold">耗損緩衝 {calc.bufferText}</span></div>
                                <div className="grid grid-cols-2 gap-x-6 gap-y-2">
                                    <div className="flex justify-between"><span>毛利 %:</span><input type="number" value={targetMargin} onChange={(e)=>setTargetMargin(e.target.value)} className="w-8 text-right font-black" /></div>
                                    <div className="flex justify-between"><span>預估重:</span><span className="font-black">{calc.finalW} 錢</span></div>
                                    <div className="flex justify-between pt-2 border-t border-gray-200 col-span-2 font-black text-amber-900"><span>預計利潤:</span><span>${calc.profit.toLocaleString()}</span></div>
                                </div>
                            </div>
                        )}

                        <div className="mt-auto p-8 rounded-[40px] shadow-2xl text-center relative overflow-hidden" style={{ backgroundColor: BRAND.SECONDARY }}>
                            <div className="absolute top-4 left-6 px-4 py-1.5 bg-black/10 rounded-full text-[10px] text-white font-black uppercase tracking-widest">{calc.diff > 0 ? `放大 ${Math.abs(calc.diff)} 號` : calc.diff < 0 ? `縮小 ${Math.abs(calc.diff)} 號` : '不變'}</div>
                            <div className="text-[11px] font-black tracking-[0.4em] text-white/60 mb-3 uppercase">建議對客報價</div>
                            <div className="flex items-baseline justify-center gap-2"><span className="text-3xl font-bold text-white/40 italic">$</span><span className="text-7xl font-black tracking-tighter text-gray-900">{calc.quote.toLocaleString()}</span></div>
                        </div>
                        <div className="safe-bottom text-[9px] text-center text-gray-400 py-4 font-black tracking-[0.3em] uppercase">{TrendingUp && <TrendingUp size={12} className="inline mr-1" />} 品牌專業報價服務</div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
