<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>戒指報價系統</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; user-select: none; background-color: #1E0E0A; margin: 0; padding: 0; font-family: -apple-system, sans-serif; overflow: hidden; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        #root { height: 100vh; display: flex; flex-direction: column; background: #fff; }
        .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; color: #D5B98E; background-color: #1E0E0A; font-weight: bold; }
        input { border: none; background: transparent; outline: none; }
    </style>
</head>
<body>
    <div id="root"><div class="loading-screen">系統啟動中...</div></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            const [isAdmin, setIsAdmin] = useState(false);
            const [material, setMaterial] = useState('gold');
            const [goldPrice, setGoldPrice] = useState(18500);
            const [platinumPrice, setPlatinumPrice] = useState(13500);
            const [width, setWidth] = useState('3.0');
            const [thickness, setThickness] = useState('1.5');
            const [currentSize, setCurrentSize] = useState(10);
            const [targetSize, setTargetSize] = useState(11);
            const [laborFee, setLaborFee] = useState(1000);
            const [targetMargin, setTargetMargin] = useState(25);

            const calc = useMemo(() => {
                const p = material === 'gold' ? Number(goldPrice) : Number(platinumPrice);
                const w = Number(width) || 0;
                const t = Number(thickness) || 0;
                const diff = (Number(targetSize) || 0) - (Number(currentSize) || 0);
                
                let baseD = 0.01;
                if (w >= 4.0) baseD = 0.019;
                else if (w >= 3.0) baseD = 0.014;
                else if (w >= 2.0) baseD = 0.01;

                let weight = (diff / 0.5) * baseD * (t / 1.5) * (material === 'platinum' ? 1.3 : 1.0);
                if (weight < 0) weight = 0;
                const finalW = weight * (material === 'platinum' ? 1.2 : 1.15);
                const cost = Math.round(finalW * p) + Number(laborFee);
                const quote = Math.round(cost / (1 - targetMargin/100));

                return { diff: diff.toFixed(1), finalW: finalW.toFixed(4), cost, quote };
            }, [goldPrice, platinumPrice, material, width, thickness, currentSize, targetSize, laborFee, targetMargin]);

            return (
                <div className="flex-1 flex flex-col bg-white">
                    <div className="safe-top" style={{ backgroundColor: '#1E0E0A' }}>
                        <div className="px-5 py-4 flex justify-between items-center text-white">
                            <div className="font-bold tracking-widest">戒指改圍報價系統</div>
                            <div onClick={() => setIsAdmin(!isAdmin)} className="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                {isAdmin ? '🔓' : '🔒'}
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 p-5 space-y-4 overflow-y-auto">
                        <div className="flex p-1 bg-gray-100 rounded-xl">
                            <button onClick={() => {setMaterial('gold'); setLaborFee(1000);}} className={`flex-1 py-2 rounded-lg text-sm font-bold ${material === 'gold' ? 'bg-white shadow text-amber-700' : 'text-gray-400'}`}>18K金</button>
                            <button onClick={() => {setMaterial('platinum'); setLaborFee(1500);}} className={`flex-1 py-2 rounded-lg text-sm font-bold ${material === 'platinum' ? 'bg-white shadow text-slate-700' : 'text-gray-400'}`}>鉑金</button>
                        </div>

                        <div className="bg-gray-100 p-4 rounded-2xl">
                            <label className="text-[10px] font-bold text-amber-700 block mb-1">今日金價 (TWD/錢)</label>
                            <input type="number" value={material === 'gold' ? goldPrice : platinumPrice} onChange={(e) => material === 'gold' ? setGoldPrice(e.target.value) : setPlatinumPrice(e.target.value)} className="w-full text-2xl font-bold text-gray-800" />
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div className="border-b-2 p-1"><label className="text-[10px] opacity-50 block font-bold">寬度 (mm)</label><input type="number" value={width} onChange={(e)=>setWidth(e.target.value)} className="w-full font-bold" /></div>
                            <div className="border-b-2 p-1"><label className="text-[10px] opacity-50 block font-bold">厚度 (mm)</label><input type="number" value={thickness} onChange={(e)=>setThickness(e.target.value)} className="w-full font-bold" /></div>
                            <div className="border-b-2 p-1"><label className="text-[10px] opacity-50 block font-bold">原手圍</label><input type="number" value={currentSize} onChange={(e)=>setCurrentSize(e.target.value)} className="w-full" /></div>
                            <div className="border-b-2 p-1 border-amber-300"><label className="text-[10px] text-amber-600 block font-bold">目標手圍</label><input type="number" value={targetSize} onChange={(e)=>setTargetSize(e.target.value)} className="w-full font-bold text-lg" /></div>
                        </div>

                        {isAdmin && (
                            <div className="p-4 bg-amber-50 rounded-2xl border-l-4 border-amber-400 space-y-1 text-xs">
                                <div className="flex justify-between"><span>毛利設定 %:</span><input type="number" value={targetMargin} onChange={(e)=>setTargetMargin(e.target.value)} className="w-10 text-right font-bold" /></div>
                                <div className="flex justify-between"><span>預估重量:</span><span className="font-bold">{calc.finalW} 錢</span></div>
                                <div className="flex justify-between border-t pt-1 font-bold text-amber-800"><span>總成本:</span><span>${calc.cost.toLocaleString()}</span></div>
                            </div>
                        )}

                        <div className="mt-auto p-8 rounded-3xl shadow-xl text-center relative overflow-hidden" style={{ backgroundColor: '#D5B98E' }}>
                            <div className="absolute top-3 left-3 px-3 py-1 bg-black/10 rounded-full text-[10px] font-bold">{calc.diff > 0 ? `+${calc.diff} 號` : `${calc.diff} 號`}</div>
                            <div className="text-[11px] font-black tracking-[0.3em] opacity-60 mb-2 uppercase">建議報價</div>
                            <div className="flex items-baseline justify-center gap-1"><span className="text-2xl font-bold opacity-60">$</span><span className="text-6xl font-black tracking-tighter text-gray-900">{calc.quote.toLocaleString()}</span></div>
                        </div>
                        <div className="safe-bottom text-[9px] text-center text-gray-400 py-3 tracking-widest font-bold">品牌專業報價服務</div>
                    </div>
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
